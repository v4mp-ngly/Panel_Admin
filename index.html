<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Plaza Andalucía</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.1"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#163a5f;--verde:#7ab72e;--text:#1a2533;--bg:#f4f7fa}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}
.header{background:var(--azul);color:white;padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center}
.header h1{margin:0;font-size:24px}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:600}
.btn-logout{background:#b91c1c;color:white}
.btn-logout:hover{background:#991818}
.container{max-width:1400px;margin:0 auto;padding:2rem}
.hidden{display:none!important}
.login-box{max-width:400px;margin:50px auto;background:white;border-radius:12px;padding:2rem;box-shadow:0 2px 20px rgba(0,0,0,0.1)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:6px}
.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.form-group input:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 3px rgba(22,58,95,.1)}
.btn-submit{width:100%;padding:12px;background:var(--azul);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;margin-top:1rem}
.btn-submit:hover{background:#0f2847}
.table-wrapper{background:white;border-radius:12px;box-shadow:0 2px 20px rgba(0,0,0,0.1);overflow:hidden}
.search-box{margin-bottom:2rem}
.search-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
table{width:100%;border-collapse:collapse}
thead{background:var(--azul);color:white}
th{padding:1rem;text-align:left;font-weight:600;font-size:13px}
td{padding:1rem;border-bottom:1px solid #eee;font-size:13px}
tbody tr:hover{background:#f9f9f9}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.badge-done{background:#eef6e0;color:#5c8f1e}
.badge-pending{background:#f0f0f0;color:#666}
.action-btns{display:flex;gap:8px}
.btn-small{padding:6px 12px;background:var(--azul);color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.btn-small:hover{background:#0f2847}
.btn-small.danger{background:#b91c1c}
.btn-small.danger:hover{background:#991818}
.modal{display:none;position:fixed;z-index:1000;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);overflow-y:auto}
.modal.active{display:block}
.modal-content{background:white;border-radius:12px;max-width:700px;width:95%;margin:50px auto;padding:2rem;box-shadow:0 2px 20px rgba(0,0,0,0.1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;border-bottom:1px solid #eee;padding-bottom:1rem}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#666}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.5rem 0}
.info-item{background:#e8f0f7;padding:1rem;border-radius:8px}
.info-label{font-size:11px;font-weight:600;color:#666;text-transform:uppercase}
.info-value{font-size:16px;font-weight:700;color:var(--azul);margin-top:4px}
.alert{padding:1rem;border-radius:8px;margin-bottom:1rem}
.alert-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.alert-danger{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.loading{text-align:center;padding:2rem}
.spinner{display:inline-block;width:40px;height:40px;border:4px solid #ddd;border-top-color:var(--azul);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .info-grid{grid-template-columns:1fr}
  .action-btns{flex-direction:column}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-section">
  <div class="header">
    <h1>Plaza Andalucía - Admin</h1>
  </div>
  <div class="login-box">
    <h2 style="color:var(--azul);margin-bottom:2rem">Acceso Admin</h2>
    <div id="login-alert"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="nicole@numedrd.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn-submit" onclick="loginUser()">Acceder</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-section" class="hidden">
  <div class="header">
    <h1>Plaza Andalucía - Panel Admin</h1>
    <button class="btn btn-logout" onclick="logoutUser()">Salir</button>
  </div>
  <div class="container">
    <h2 style="color:var(--azul);margin-bottom:1rem">Registros de Asistencia</h2>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Buscar por nombre o cédula..." onkeyup="filterUsers()">
    </div>
    <div id="alert-container"></div>
    <div id="loading-container"></div>
    <div class="table-wrapper">
      <table id="users-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Empresa</th>
            <th>Paso 1</th>
            <th>Paso 2</th>
            <th>Paso 3</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="detail-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title">Detalles</h3>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="info-grid">
      <div class="info-item"><div class="info-label">Nombre</div><div class="info-value" id="detail-nombre">-</div></div>
      <div class="info-item"><div class="info-label">Cédula</div><div class="info-value" id="detail-cedula">-</div></div>
      <div class="info-item"><div class="info-label">Empresa</div><div class="info-value" id="detail-empresa">-</div></div>
      <div class="info-item"><div class="info-label">Sucursal</div><div class="info-value" id="detail-sucursal">-</div></div>
      <div class="info-item"><div class="info-label">WhatsApp</div><div class="info-value" id="detail-whatsapp">-</div></div>
      <div class="info-item"><div class="info-label">Correo</div><div class="info-value" id="detail-correo">-</div></div>
    </div>
    <div class="action-btns" style="justify-content:flex-end;gap:10px;margin-top:2rem">
      <button class="btn-small" onclick="downloadPDFNow()">📥 Descargar PDF</button>
      <button class="btn-small danger" onclick="deleteRecord()">🗑️ Eliminar</button>
      <button class="btn-small" onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lfyholfrqxyryveikspy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeWhvbGZycXh5cnl2ZWlrc3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDc3ODgsImV4cCI6MjA5OTAyMzc4OH0.kn93eFHmXPdHQShjsV2-4Gn4ThXSVtwQkBEkfBsEuO8';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let allUsers = [];
let editingUser = null;

async function loginUser() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) {
    showAlert('Completa todos los campos', 'danger');
    return;
  }
  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    currentUser = data.user;
    loadRecords();
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('dashboard-section').classList.remove('hidden');
  } catch (error) {
    showAlert('Error: ' + error.message, 'danger');
  }
}

async function logoutUser() {
  await supabase.auth.signOut();
  currentUser = null;
  document.getElementById('login-section').classList.remove('hidden');
  document.getElementById('dashboard-section').classList.add('hidden');
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

async function loadRecords() {
  document.getElementById('loading-container').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const { data, error } = await supabase
      .from('plaza_andalucia_registros')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) throw error;
    allUsers = data || [];
    renderTable(allUsers);
  } catch (error) {
    showAlert('Error: ' + error.message, 'danger');
  }
  document.getElementById('loading-container').innerHTML = '';
}

function renderTable(users) {
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '';
  users.forEach(user => {
    const p1 = user.estado === 'asistencia' || user.estado === 'consentimiento' || user.estado === 'completado';
    const p2 = user.estado === 'consentimiento' || user.estado === 'completado';
    const p3 = user.estado === 'completado';
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${user.nombre || '-'}</td>
      <td>${user.cedula || '-'}</td>
      <td>${user.empresa || '-'}</td>
      <td><span class="badge ${p1 ? 'badge-done' : 'badge-pending'}">${p1 ? '✓' : '✗'}</span></td>
      <td><span class="badge ${p2 ? 'badge-done' : 'badge-pending'}">${p2 ? '✓' : '✗'}</span></td>
      <td><span class="badge ${p3 ? 'badge-done' : 'badge-pending'}">${p3 ? '✓' : '✗'}</span></td>
      <td>
        <div class="action-btns">
          <button class="btn-small" onclick="viewDetails('${user.id}')">Ver</button>
          <button class="btn-small" onclick="quickPDF('${user.id}')">PDF</button>
        </div>
      </td>
    `;
    tbody.appendChild(row);
  });
}

function viewDetails(id) {
  editingUser = allUsers.find(u => u.id === id);
  if (!editingUser) return;
  
  document.getElementById('modal-title').textContent = 'Detalles - ' + editingUser.nombre;
  document.getElementById('detail-nombre').textContent = editingUser.nombre || '-';
  document.getElementById('detail-cedula').textContent = editingUser.cedula || '-';
  document.getElementById('detail-empresa').textContent = editingUser.empresa || '-';
  document.getElementById('detail-sucursal').textContent = editingUser.sucursal || '-';
  document.getElementById('detail-whatsapp').textContent = editingUser.whatsapp || '-';
  document.getElementById('detail-correo').textContent = editingUser.correo || '-';
  document.getElementById('detail-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('active');
  editingUser = null;
}

async function downloadPDFNow() {
  if (!editingUser) return;
  await generarPDF(editingUser);
}

async function quickPDF(id) {
  const user = allUsers.find(u => u.id === id);
  if (!user) return;
  await generarPDF(user);
}

async function generarPDF(user) {
  try {
    const p1 = user.estado === 'asistencia' || user.estado === 'consentimiento' || user.estado === 'completado';
    const p2 = user.estado === 'consentimiento' || user.estado === 'completado';
    const p3 = user.estado === 'completado';

    const htmlContent = `
      <div style="padding: 40px; font-family: Arial; max-width: 900px;">
        <div style="text-align: center; margin-bottom: 40px; border-bottom: 3px solid #163a5f; padding-bottom: 20px;">
          <h1 style="color: #163a5f; margin: 0; font-size: 32px;">PLAZA ANDALUCÍA</h1>
          <p style="color: #7ab72e; margin: 10px 0 0 0; font-size: 16px; font-weight: bold;">Programa de Nutrición y Prevención</p>
        </div>
        
        <h2 style="color: #163a5f; margin: 30px 0 20px 0; font-size: 24px;">Registro de Participante</h2>
        
        <table style="width: 100%; border-collapse: collapse; margin: 25px 0; font-size: 14px;">
          <tr><td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; background: #e8f0f7; width: 35%;">Nombre:</td><td style="padding: 12px; border: 1px solid #ddd;">${user.nombre || '-'}</td></tr>
          <tr><td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; background: #e8f0f7;">Cédula:</td><td style="padding: 12px; border: 1px solid #ddd;">${user.cedula || '-'}</td></tr>
          <tr><td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; background: #e8f0f7;">Empresa:</td><td style="padding: 12px; border: 1px solid #ddd;">${user.empresa || '-'}</td></tr>
          <tr><td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; background: #e8f0f7;">Sucursal:</td><td style="padding: 12px; border: 1px solid #ddd;">${user.sucursal || '-'}</td></tr>
          <tr><td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; background: #e8f0f7;">WhatsApp:</td><td style="padding: 12px; border: 1px solid #ddd;">${user.whatsapp || '-'}</td></tr>
          <tr><td style="padding: 12px; border: 1px solid #ddd; font-weight: bold; background: #e8f0f7;">Correo:</td><td style="padding: 12px; border: 1px solid #ddd;">${user.correo || '-'}</td></tr>
        </table>
        
        <h3 style="color: #163a5f; margin: 30px 0 15px 0; font-size: 18px;">Estado del Programa</h3>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 14px;">
          <tr><td style="padding: 14px; border: 2px solid #ddd; font-weight: bold; background: ${p1 ? '#eef6e0' : '#fff3cd'};">✓ Paso 1: Asistencia</td><td style="padding: 14px; border: 2px solid #ddd; text-align: center; background: ${p1 ? '#eef6e0' : '#fff3cd'}; font-weight: bold;">${p1 ? 'COMPLETO' : 'PENDIENTE'}</td></tr>
          <tr><td style="padding: 14px; border: 2px solid #ddd; font-weight: bold; background: ${p2 ? '#eef6e0' : '#fff3cd'};">✓ Paso 2: Consentimiento</td><td style="padding: 14px; border: 2px solid #ddd; text-align: center; background: ${p2 ? '#eef6e0' : '#fff3cd'}; font-weight: bold;">${p2 ? 'COMPLETO' : 'PENDIENTE'}</td></tr>
          <tr><td style="padding: 14px; border: 2px solid #ddd; font-weight: bold; background: ${p3 ? '#eef6e0' : '#fff3cd'};">✓ Paso 3: Evaluación</td><td style="padding: 14px; border: 2px solid #ddd; text-align: center; background: ${p3 ? '#eef6e0' : '#fff3cd'}; font-weight: bold;">${p3 ? 'COMPLETO' : 'PENDIENTE'}</td></tr>
        </table>
        
        <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 12px; color: #666;">
          <p><strong>Fecha de Emisión:</strong> ${new Date().toLocaleDateString('es-DO')}</p>
          <p style="margin-top: 10px;">Documento generado por Plaza Andalucía - NUMED</p>
        </div>
      </div>
    `;

    const element = document.createElement('div');
    element.innerHTML = htmlContent;
    element.style.position = 'absolute';
    element.style.left = '-9999px';
    element.style.width = '800px';
    document.body.appendChild(element);

    await new Promise(resolve => setTimeout(resolve, 500));

    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff'
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: 'a4'
    });

    const imgWidth = 210;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    heightLeft -= 297;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
      heightLeft -= 297;
    }

    pdf.save(`registro_${user.cedula}.pdf`);
    document.body.removeChild(element);
    showAlert('✅ PDF descargado: ' + user.nombre, 'success');

  } catch (error) {
    console.error('Error PDF:', error);
    showAlert('⚠️ Error al generar PDF: ' + error.message, 'danger');
  }
}

async function deleteRecord() {
  if (!editingUser) return;
  if (!confirm('¿Eliminar este registro?')) return;
  
  try {
    const { error } = await supabase
      .from('plaza_andalucia_registros')
      .delete()
      .eq('id', editingUser.id);
    if (error) throw error;
    showAlert('Registro eliminado', 'success');
    closeModal();
    loadRecords();
  } catch (error) {
    showAlert('Error: ' + error.message, 'danger');
  }
}

function filterUsers() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const filtered = allUsers.filter(u => 
    (u.nombre && u.nombre.toLowerCase().includes(search)) || 
    (u.cedula && u.cedula.includes(search))
  );
  renderTable(filtered);
}

function showAlert(msg, type) {
  const container = document.getElementById('alert-container');
  const alert = document.createElement('div');
  alert.className = `alert alert-${type}`;
  alert.textContent = msg;
  container.innerHTML = '';
  container.appendChild(alert);
  setTimeout(() => container.innerHTML = '', 5000);
}

window.addEventListener('load', async () => {
  const session = await supabase.auth.getSession();
  if (session.data.session) {
    currentUser = session.data.session.user;
    loadRecords();
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('dashboard-section').classList.remove('hidden');
  }
});
</script>

</body>
</html>
