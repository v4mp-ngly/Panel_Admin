<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Personas por Locales - NUMED</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#163a5f;--azul-med:#1e5080;--azul-light:#e8f0f7;
  --verde:#7ab72e;--verde-dark:#5c8f1e;--verde-light:#eef6e0;
  --text:#1a2533;--text-muted:#4a5a6e;--text-hint:#8a9bae;
  --border:rgba(30,80,128,0.12);--border-med:rgba(30,80,128,0.22);
  --bg:#f4f7fa;--white:#fff;--radius:12px;--radius-sm:8px;
  --shadow:0 2px 16px rgba(30,80,128,0.08);--shadow-lg:0 8px 32px rgba(30,80,128,0.13)
}

body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{background:var(--azul);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--verde);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.topbar-brand{display:flex;align-items:center;gap:15px}
.topbar-logo{height:34px;width:auto}
.topbar-info{display:flex;flex-direction:column;justify-content:center}
.topbar-name{font-family:'Playfair Display',serif;font-size:17px;color:#fff;font-weight:600}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.btn-logout{font-size:12px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,.2)}

.content{max-width:1200px;margin:0 auto;padding:1.5rem 1rem 3rem}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:2rem}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.stat-label{font-size:10px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:600;color:var(--azul);font-family:'Playfair Display',serif;margin-bottom:4px}
.stat-sub{font-size:11px;color:var(--text-hint)}

.tabs-container{display:flex;gap:0;overflow-x:auto;margin-bottom:1.5rem;border-bottom:2px solid var(--border);padding-bottom:0}
.tab-local{padding:12px 18px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border:none;background:transparent;font-family:'Outfit',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tab-local.active{color:var(--azul);border-bottom-color:var(--verde)}
.tab-local:hover:not(.active){color:var(--azul-med)}
.tab-count{background:var(--azul-light);color:var(--azul-med);border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700}

.filters-bar{background:var(--white);padding:1rem;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.5rem;display:flex;gap:12px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow)}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'Outfit',sans-serif}
.search-box input:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 2px var(--azul-light)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-hint);font-size:14px}

.local-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:2rem}
.local-header{background:var(--azul);color:#fff;padding:1rem;display:flex;justify-content:space-between;align-items:center}
.local-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.local-meta{font-size:12px;opacity:.9}

table{width:100%;border-collapse:collapse}
th{background:var(--azul-light);padding:12px;text-align:left;font-size:12px;font-weight:600;color:var(--azul);text-transform:uppercase;letter-spacing:.05em}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
tr:hover{background:var(--azul-light)}

.col-acciones{text-align:center;display:flex;gap:6px;justify-content:center}
.btn-edit{background:var(--azul-med);color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-edit:hover{background:var(--azul)}
.btn-pdf{background:var(--verde);color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-pdf:hover{background:var(--verde-dark)}

.status-badge{display:inline-block;padding:4px 8px;border-radius:4px;font-size:10px;font-weight:600}
.status-presente{background:var(--verde-light);color:#2d5016}
.status-pendiente{background:#fce7f3;color:#831843}

code{background:rgba(30,80,128,0.1);padding:2px 4px;border-radius:3px;font-size:11px}

.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background-color:rgba(0,0,0,0.5)}
.modal.show{display:flex;align-items:center;justify-content:center}
.modal-content{background-color:var(--white);padding:0;border-radius:var(--radius);box-shadow:var(--shadow-lg);width:90%;max-width:500px}
.modal-header{background:var(--azul);color:#fff;padding:1rem;font-weight:600;border-radius:var(--radius) var(--radius) 0 0}
.modal-body{padding:1.5rem}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:1rem 1.5rem;border-top:1px solid var(--border)}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;transition:all .2s}
.btn-primary{background:var(--azul);color:#fff}
.btn-primary:hover{background:var(--azul-med)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:var(--border-med)}

input[type="text"],input[type="email"],textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:'Outfit',sans-serif;font-size:13px;margin-bottom:12px}
input[type="text"]:focus,textarea:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 2px var(--azul-light)}
label{display:block;margin-bottom:6px;font-weight:600;font-size:13px;color:var(--text)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-info">
      <div class="topbar-name">🩺 Personas por Locales</div>
      <div class="topbar-sub">Panel Administrativo NUMED</div>
    </div>
  </div>
  <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

<div class="content">
  
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Personas</div>
      <div class="stat-value" id="totalPersonas">0</div>
      <div class="stat-sub">Registrados</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Locales</div>
      <div class="stat-value" id="totalLocales">0</div>
      <div class="stat-sub">Activos</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Presentes</div>
      <div class="stat-value" id="totalPresentes">0</div>
      <div class="stat-sub">Confirmados</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pendientes</div>
      <div class="stat-value" id="totalPendientes">0</div>
      <div class="stat-sub">Por confirmar</div>
    </div>
  </div>

  <div class="tabs-container" id="tabs"></div>

  <div class="filters-bar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="buscar" placeholder="Buscar por nombre, cédula..." onkeyup="filtrar()">
    </div>
    <select id="filtroEstado" style="padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:'Outfit',sans-serif;font-size:13px" onchange="filtrar()">
      <option value="">Todos los estados</option>
      <option value="presente">Presente</option>
      <option value="pendiente">Pendiente</option>
    </select>
  </div>

  <div id="contenido"></div>

</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Editar Registro</div>
    <div class="modal-body">
      <label>Nombre</label>
      <input type="text" id="modalNombre" disabled>
      <label>Cédula</label>
      <input type="text" id="modalCedula" disabled>
      <label>Empresa</label>
      <input type="text" id="modalEmpresa" disabled>
      <label>Estado</label>
      <select id="modalEstado" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:'Outfit',sans-serif;margin-bottom:12px">
        <option value="presente">Presente</option>
        <option value="pendiente">Pendiente</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEdicion()">Guardar</button>
    </div>
  </div>
</div>

<script>
const SUPA_URL = "https://lfyholfrqxyryveikspy.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeWhvbGZycXh5cnl2ZWlrc3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDc3ODgsImV4cCI6MjA5OTAyMzc4OH0.kn93eFHmXPdHQShjsV2-4Gn4ThXSVtwQkBEkfBsEuO8";

const LOCALES = [
  "SMASH BY CRHRIS","GRUPO EJ TAVAREZ","BANCO POPULAR","BANCO POPULAR DIVISION CANALES","NUCHY BAR (CANTICO)",
  "LOTEKA SRL","MANIAPHONE RD","GOLD AND SILVER","LIZA BLANCO BEAUTY STUDIO","LIZA BLANCO BOUTIQUE",
  "BAGELS SHOP (CAFE ALTA SENAL)","UXMAL COMERCIAL SRL","VITASALUD SRL","ROYAL PALMS","PROIMAGEN",
  "CHURCHILL BUSINESS SRL","COSFICLINIC","TASTY ROLLS","UPS DOMINICANA SA","COLMADON LOS REALES/SALOMON SAING",
  "GRUPO CAROL S.A.S.","VINICOLA DEL NORTE","CRIS SPECIAL NATURAL SRL","OLIVER PELUQUERIA","VIMAR BEAUTY CENTER",
  "GALAN ALFONSO GROUP SRL/ATUENDO","OFICINAS ADMINISTRATIVAS","7080 SMOKE ROOM","D CABALLEROS TRAJES ELEGANTES",
  "ARCE DOMINICANA SRL","TRESS HAIR LAB & BEAUTY","LUCIA SQD","HAIR CLUB","LUMEN RESTAURANTE",
  "OZEANO SWIMWEAR","FUNDACION PARA EL ARTE Y EL DESARROLLO ARTEDOM","BARBAROCK S.R.L.","BE GALA TRAJES ELEGANTES",
  "GRUPO JAYASE","CENTRO DE PSICOLOGIA Y METAMORFOSIS"
];

let datosPersonas = [];
let registroActual = null;

async function cargarDatos() {
  try {
    console.log('🔄 Conectando a Supabase...');
    const res = await fetch(SUPA_URL + "/rest/v1/asistencias_virtuales", {
      headers: {"apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY}
    });
    console.log('📊 Respuesta:', res.status);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    datosPersonas = await res.json();
    console.log('✅ Datos cargados:', datosPersonas.length, 'registros');
    renderizar();
  } catch (error) {
    console.error('🔴 Error:', error);
    document.getElementById('contenido').innerHTML = `<p style="color:red">❌ Error conectando a Supabase: ${error.message}</p>`;
  }
}

function renderizar() {
  const totalPersonas = datosPersonas.length;
  const localesActivos = new Set(datosPersonas.map(p => p.empresa)).size;
  const presentes = datosPersonas.filter(p => p.estado_asistencia === 'presente').length;
  
  document.getElementById('totalPersonas').textContent = totalPersonas;
  document.getElementById('totalLocales').textContent = localesActivos;
  document.getElementById('totalPresentes').textContent = presentes;
  document.getElementById('totalPendientes').textContent = totalPersonas - presentes;

  const tabsHtml = LOCALES.map(local => {
    const count = datosPersonas.filter(p => p.empresa === local).length;
    return `<button class="tab-local" onclick="filtrarLocal('${local}')">${local} <span class="tab-count">${count}</span></button>`;
  }).join('');
  document.getElementById('tabs').innerHTML = tabsHtml;

  mostrarLocal(LOCALES[0]);
}

function mostrarLocal(local) {
  const personas = datosPersonas.filter(p => p.empresa === local);
  let html = '';
  if (personas.length > 0) {
    html = `
      <div class="local-section">
        <div class="local-header">
          <div>
            <div class="local-title">📍 ${local}</div>
            <div class="local-meta">${personas.length} personas registradas • ✓ ${personas.filter(p => p.estado_asistencia === 'presente').length} comprometidas</div>
          </div>
        </div>
        <table>
          <thead><tr>
            <th>Nombre</th><th>Cédula</th><th>Empresa</th><th>Estado</th><th>Compromiso</th><th>Firma</th><th>Hora Ingreso</th><th>Acciones</th>
          </tr></thead>
          <tbody>
            ${personas.map((p, i) => `
              <tr>
                <td>${p.nombre}</td>
                <td>${p.cedula}</td>
                <td>${p.empresa}</td>
                <td><span class="status-badge status-${p.estado_asistencia}">${p.estado_asistencia.toUpperCase()}</span></td>
                <td>${p.firma ? '✓ COMPROMETIDO' : '-'}</td>
                <td><code>${p.firma || '-'}</code></td>
                <td>${p.hora_ingreso ? new Date(p.hora_ingreso).toLocaleString('es-ES') : '-'}</td>
                <td class="col-acciones">
                  <button class="btn-edit" onclick="abrirModal(${datosPersonas.indexOf(p)})">✏️ Editar</button>
                  <button class="btn-pdf" onclick="descargarPDF(${datosPersonas.indexOf(p)})">📄 PDF</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }
  document.getElementById('contenido').innerHTML = html;
}

function filtrarLocal(local) {
  mostrarLocal(local);
}

function filtrar() {
  const busqueda = document.getElementById('buscar').value.toLowerCase();
  const estado = document.getElementById('filtroEstado').value;
  const filtrados = datosPersonas.filter(p => 
    (p.nombre.toLowerCase().includes(busqueda) || p.cedula.includes(busqueda)) &&
    (!estado || p.estado_asistencia === estado)
  );
  
  const locales = [...new Set(filtrados.map(p => p.empresa))];
  if (locales.length === 0) {
    document.getElementById('contenido').innerHTML = '<p style="padding:20px;color:var(--text-hint)">No hay resultados</p>';
  } else {
    document.getElementById('contenido').innerHTML = locales.map(local => {
      const personas = filtrados.filter(p => p.empresa === local);
      return `
        <div class="local-section">
          <div class="local-header">
            <div>
              <div class="local-title">📍 ${local}</div>
              <div class="local-meta">${personas.length} personas</div>
            </div>
          </div>
          <table>
            <thead><tr>
              <th>Nombre</th><th>Cédula</th><th>Estado</th><th>Compromiso</th><th>Acciones</th>
            </tr></thead>
            <tbody>
              ${personas.map(p => `
                <tr>
                  <td>${p.nombre}</td>
                  <td>${p.cedula}</td>
                  <td><span class="status-badge status-${p.estado_asistencia}">${p.estado_asistencia.toUpperCase()}</span></td>
                  <td>${p.firma ? '✓' : '-'}</td>
                  <td class="col-acciones">
                    <button class="btn-edit" onclick="abrirModal(${datosPersonas.indexOf(p)})">✏️ Editar</button>
                    <button class="btn-pdf" onclick="descargarPDF(${datosPersonas.indexOf(p)})">📄 PDF</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }).join('');
  }
}

function abrirModal(idx) {
  registroActual = idx;
  const p = datosPersonas[idx];
  document.getElementById('modalNombre').value = p.nombre;
  document.getElementById('modalCedula').value = p.cedula;
  document.getElementById('modalEmpresa').value = p.empresa;
  document.getElementById('modalEstado').value = p.estado_asistencia;
  document.getElementById('modal').classList.add('show');
}

function cerrarModal() {
  document.getElementById('modal').classList.remove('show');
}

async function guardarEdicion() {
  const estado = document.getElementById('modalEstado').value;
  try {
    const res = await fetch(SUPA_URL + "/rest/v1/asistencias_virtuales?id=eq." + datosPersonas[registroActual].id, {
      method: "PATCH",
      headers: {"apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY, "Content-Type": "application/json"},
      body: JSON.stringify({estado_asistencia: estado})
    });
    if (res.ok) {
      datosPersonas[registroActual].estado_asistencia = estado;
      cerrarModal();
      renderizar();
    }
  } catch(e) {
    alert('Error al guardar: ' + e);
  }
}

function descargarPDF(idx) {
  const p = datosPersonas[idx];
  const fechaActual = new Date().toLocaleDateString('es-ES', {year: 'numeric', month: 'long', day: 'numeric'});

  const htmlContent = `
