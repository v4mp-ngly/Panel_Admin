<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Personas por Locales - NUMED</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#163a5f;--azul-med:#1e5080;--azul-light:#e8f0f7;
  --verde:#7ab72e;--verde-dark:#5c8f1e;--verde-light:#eef6e0;
  --text:#1a2533;--text-muted:#4a5a6e;--text-hint:#8a9bae;
  --border:rgba(30,80,128,0.12);--border-med:rgba(30,80,128,0.22);
  --bg:#f4f7fa;--white:#fff;--radius:12px;--radius-sm:8px;
  --shadow:0 2px 16px rgba(30,80,128,0.08);--shadow-lg:0 8px 32px rgba(30,80,128,0.13)
}

body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--azul);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--verde);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.topbar-brand{display:flex;align-items:center;gap:15px}
.topbar-logo{height:34px;width:auto}
.topbar-info{display:flex;flex-direction:column;justify-content:center}
.topbar-name{font-family:'Playfair Display',serif;font-size:17px;color:#fff;font-weight:600}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.btn-logout{font-size:12px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,.2)}

/* CONTENT */
.content{max-width:1200px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:2rem}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.stat-label{font-size:10px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:600;color:var(--azul);font-family:'Playfair Display',serif;margin-bottom:4px}
.stat-sub{font-size:11px;color:var(--text-hint)}

/* TABS LOCALES */
.tabs-container{display:flex;gap:0;overflow-x:auto;margin-bottom:1.5rem;border-bottom:2px solid var(--border);padding-bottom:0}
.tab-local{padding:12px 18px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border:none;background:transparent;font-family:'Outfit',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tab-local.active{color:var(--azul);border-bottom-color:var(--verde)}
.tab-local:hover:not(.active){color:var(--azul-med)}
.tab-count{background:var(--azul-light);color:var(--azul-med);border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700}

/* FILTROS Y BUSQUEDA */
.filters-bar{background:var(--white);padding:1rem;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1.5rem;display:flex;gap:12px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow)}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border-med);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:13px}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px}
.filter-select{padding:8px 12px;border:1px solid var(--border-med);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:13px;background:var(--white);color:var(--text);cursor:pointer}

/* TABLA PERSONAS */
.local-section{display:none}
.local-section.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.local-header{background:var(--azul);color:#fff;padding:1rem 1.25rem;border-radius:var(--radius) var(--radius) 0 0;margin-bottom:1rem}
.local-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:.25rem}
.local-sub{font-size:12px;color:rgba(255,255,255,.7)}

.table-wrapper{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:2rem}
.table-container{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--azul-light);color:var(--azul);padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid var(--border-med)}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
tbody tr:hover{background:var(--bg)}

.status-badge{display:inline-block;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600;text-transform:uppercase}
.status-present{background:var(--verde-light);color:var(--verde-dark);border:1px solid rgba(122,183,46,.3)}
.status-pending{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.status-absent{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}

.col-acciones{text-align:center}
.btn-edit{background:var(--azul-med);color:#fff;border:none;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-edit:hover{background:var(--azul)}

/* FIRMA */
code{background:var(--bg);padding:3px 6px;border-radius:4px;font-family:'Monaco','Courier New',monospace}

.empty-state{padding:3rem 2rem;text-align:center;color:var(--text-hint)}
.empty-icon{font-size:48px;margin-bottom:1rem;opacity:.5}
.empty-text{font-size:14px;margin-bottom:.5rem}

/* MODAL */
#editModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
#editModal.show{display:flex}
.modal-content{background:var(--white);border-radius:var(--radius);max-width:400px;width:90%;overflow:hidden;box-shadow:var(--shadow-lg)}
.modal-header{background:var(--azul);color:#fff;padding:1rem 1.25rem;font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.modal-body{padding:1.5rem}
.modal-field{margin-bottom:1rem}
.modal-field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px}
.modal-field input,.modal-field select{width:100%;padding:8px 12px;border:1px solid var(--border-med);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:13px}
.modal-field input:focus,.modal-field select:focus{outline:none;border-color:var(--azul-med);box-shadow:0 0 0 3px rgba(30,80,128,.08)}
.modal-footer{display:flex;gap:10px;padding:1rem 1.25rem;border-top:1px solid var(--border)}
.btn-cancel{flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;cursor:pointer;font-weight:600;color:var(--text)}
.btn-cancel:hover{background:var(--border)}
.btn-save{flex:1;padding:8px;background:var(--azul-med);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;cursor:pointer;font-weight:600;transition:all .2s}
.btn-save:hover{background:var(--azul)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* RESPONSIVE */
@media(max-width:768px){
  .topbar{flex-direction:column;gap:1rem;align-items:flex-start}
  .topbar-brand{width:100%}
  .btn-logout{align-self:flex-end}
  .filters-bar{flex-direction:column}
  .search-box{width:100%}
  .stats-grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
  .table-container{overflow-x:auto}
  table{font-size:12px}
  th,td{padding:8px 10px}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-info">
      <div class="topbar-name">📍 Personas por Locales</div>
      <div class="topbar-sub">Panel Administrativo NUMED</div>
    </div>
  </div>
  <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

<!-- CONTENIDO -->
<div class="content">
  
  <!-- ESTADÍSTICAS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Personas</div>
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-sub">Registradas</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Locales</div>
      <div class="stat-value" id="stat-locales">0</div>
      <div class="stat-sub">Activos</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Presentes</div>
      <div class="stat-value" id="stat-presentes">0</div>
      <div class="stat-sub">Confirmados</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pendientes</div>
      <div class="stat-value" id="stat-pendientes">0</div>
      <div class="stat-sub">Por confirmar</div>
    </div>
  </div>

  <!-- TABS DE LOCALES -->
  <div class="tabs-container" id="tabsContainer"></div>

  <!-- FILTROS -->
  <div class="filters-bar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar por nombre, cédula..." onkeyup="filtrarTabla()">
    </div>
    <select id="filterStatus" class="filter-select" onchange="filtrarTabla()">
      <option value="">Todos los estados</option>
      <option value="presente">Presente</option>
      <option value="pendiente">Pendiente</option>
      <option value="ausente">Ausente</option>
    </select>
  </div>

  <!-- SECCIONES DE LOCALES -->
  <div id="localesContainer"></div>

</div>

<!-- MODAL EDITAR -->
<div id="editModal">
  <div class="modal-content">
    <div class="modal-header">Editar Registro</div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Nombre</label>
        <input type="text" id="modalNombre" readonly>
      </div>
      <div class="modal-field">
        <label>Cédula</label>
        <input type="text" id="modalCedula" readonly>
      </div>
      <div class="modal-field">
        <label>Estado</label>
        <select id="modalEstado">
          <option value="presente">Presente</option>
          <option value="pendiente">Pendiente</option>
          <option value="ausente">Ausente</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Empresa</label>
        <input type="text" id="modalEmpresa">
      </div>
      <div class="modal-field">
        <label>Firma (Compromiso)</label>
        <input type="text" id="modalFirma" placeholder="Nombre o texto de firma">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarEdicion()" id="btnGuardar">Guardar</button>
    </div>
  </div>
</div>

<script>
// ========== CONFIGURACIÓN SUPABASE ==========
const SUPA_URL = "https://lfyholfrqxyryveikspy.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeWhvbGZycXh5cnl2ZWlrc3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDc3ODgsImV4cCI6MjA5OTAyMzc4OH0.kn93eFHmXPdHQShjsV2-4Gn4ThXSVtwQkBEkfBsEuO8";

// ========== DATOS ==========
let datosPersonas = [];
let localesMap = {};
let editandoIdx = null;

// SUCURSAL 1ER NIVEL
const LOCALES_NIVEL1 = [
  "SMASH BY CRHRIS",
  "GRUPO EJ TAVAREZ",
  "BANCO POPULAR",
  "BANCO POPULAR DIVISION CANALES",
  "NUCHY BAR (CANTICO)",
  "LOTEKA SRL",
  "MANIAPHONE RD",
  "GOLD AND SILVER",
  "LIZA BLANCO BEAUTY STUDIO",
  "LIZA BLANCO BOUTIQUE",
  "BAGELS SHOP (CAFE ALTA SENAL)",
  "UXMAL COMERCIAL SRL",
  "VITASALUD SRL",
  "ROYAL PALMS",
  "PROIMAGEN",
  "CHURCHILL BUSINESS SRL",
  "COSFICLINIC",
  "TASTY ROLLS",
  "UPS DOMINICANA SA",
  "COLMADON LOS REALES/SALOMON SAING",
  "GRUPO CAROL S.A.S.",
  "VINICOLA DEL NORTE"
];

// SUCURSAL 2DO NIVEL
const LOCALES_NIVEL2 = [
  "CRIS SPECIAL NATURAL SRL",
  "OLIVER PELUQUERIA",
  "VIMAR BEAUTY CENTER",
  "GALAN ALFONSO GROUP SRL/ATUENDO",
  "OFICINAS ADMINISTRATIVAS",
  "7080 SMOKE ROOM",
  "D CABALLEROS TRAJES ELEGANTES",
  "ARCE DOMINICANA SRL",
  "TRESS HAIR LAB & BEAUTY",
  "LUCIA SQD",
  "HAIR CLUB",
  "LUMEN RESTAURANTE",
  "OZEANO SWIMWEAR",
  "FUNDACION PARA EL ARTE Y EL DESARROLLO ARTEDOM",
  "BARBAROCK S.R.L.",
  "BE GALA TRAJES ELEGANTES",
  "GRUPO JAYASE",
  "CENTRO DE PSICOLOGIA Y METAMORFOSIS"
];

const LOCALES = [...LOCALES_NIVEL1, ...LOCALES_NIVEL2];

// ========== INICIALIZACIÓN ==========
window.addEventListener('load', async () => {
  await cargarDatos();
  renderizarTabs();
  renderizarLocales();
  actualizarEstadisticas();
});

// ========== CARGAR DATOS ==========
async function cargarDatos() {
  try {
    const res = await fetch(SUPA_URL + "/rest/v1/asistencias_virtuales", {
      headers: {
        "apikey": SUPA_KEY,
        "Authorization": "Bearer " + SUPA_KEY
      }
    });
    
    if (!res.ok) throw new Error("Error al cargar datos");
    
    datosPersonas = await res.json();
    
    // Organizar por local
    localesMap = {};
    LOCALES.forEach(local => {
      localesMap[local] = datosPersonas.filter(p => p.empresa === local);
    });
    
    console.log("✓ Datos cargados:", datosPersonas.length, "registros");
  } catch (error) {
    console.error("Error cargando datos:", error);
    alert("Error al cargar los datos. Verifica la conexión.");
  }
}

// ========== RENDERIZAR TABS ==========
function renderizarTabs() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '';
  
  LOCALES.forEach((local, idx) => {
    const count = localesMap[local] ? localesMap[local].length : 0;
    const btn = document.createElement('button');
    btn.className = 'tab-local' + (idx === 0 ? ' active' : '');
    btn.innerHTML = `${local} <span class="tab-count">${count}</span>`;
    btn.onclick = () => cambiarTab(local, btn);
    container.appendChild(btn);
  });
}

function cambiarTab(local, btn) {
  document.querySelectorAll('.tab-local').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.local-section').forEach(s => s.classList.remove('active'));
  
  btn.classList.add('active');
  document.getElementById('section-' + local.replace(/ /g, '-')).classList.add('active');
  filtrarTabla();
}

// ========== RENDERIZAR LOCALES ==========
function renderizarLocales() {
  const container = document.getElementById('localesContainer');
  container.innerHTML = '';
  
  LOCALES.forEach((local, idx) => {
    const personas = localesMap[local] || [];
    const localId = 'section-' + local.replace(/ /g, '-');
    
    const section = document.createElement('div');
    section.id = localId;
    section.className = 'local-section' + (idx === 0 ? ' active' : '');
    
    let html = `
      <div class="table-wrapper">
        <div class="local-header">
          <div class="local-title">📍 ${local}</div>
          <div class="local-sub">
            ${personas.length} personas registradas 
            ${personas.filter(p => p.firma && p.firma.trim() !== '').length > 0 ? 
              `• ✓ ${personas.filter(p => p.firma && p.firma.trim() !== '').length} comprometidas` 
              : ''}
          </div>
        </div>
        <div class="table-container">
    `;
    
    if (personas.length === 0) {
      html += `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-text">Sin registros en este local</div>
        </div>
      `;
    } else {
      html += `
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Cédula</th>
              <th>Empresa</th>
              <th>Estado</th>
              <th>Compromiso</th>
              <th>Firma</th>
              <th>Hora Ingreso</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-${local.replace(/ /g, '-')}">
      `;
      
      personas.forEach((p, i) => {
        const estado = p.estado_asistencia || 'pendiente';
        const statusClass = `status-${estado}`;
        const hora = p.hora_ingreso ? new Date(p.hora_ingreso).toLocaleString('es-ES', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        }) : '-';
        
        const tieneCompromiso = p.firma && p.firma.trim() !== '';
        const compromisoClass = tieneCompromiso ? 'status-present' : 'status-absent';
        const compromisoText = tieneCompromiso ? '✓ Comprometido' : '✗ Sin firma';
        const firmaText = tieneCompromiso ? p.firma : '-';
        
        html += `
          <tr>
            <td><strong>${p.nombre || '-'}</strong></td>
            <td>${p.cedula || '-'}</td>
            <td>${p.empresa || '-'}</td>
            <td><span class="status-badge ${statusClass}">${estado}</span></td>
            <td><span class="status-badge ${compromisoClass}">${compromisoText}</span></td>
            <td><code style="font-size:11px;color:var(--text-hint);max-width:150px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${firmaText}</code></td>
            <td>${hora}</td>
            <td class="col-acciones">
              <button class="btn-edit" onclick="abrirModal(${datosPersonas.indexOf(p)})">Editar</button>
            </td>
          </tr>
        `;
      });
      
      html += `
          </tbody>
        </table>
      `;
    }
    
    html += `
        </div>
      </div>
    `;
    
    section.innerHTML = html;
    container.appendChild(section);
  });
}

// ========== FILTRAR TABLA ==========
function filtrarTabla() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const statusFilter = document.getElementById('filterStatus').value;
  
  document.querySelectorAll('table tbody tr').forEach(row => {
    const nombre = row.cells[0].textContent.toLowerCase();
    const cedula = row.cells[1].textContent.toLowerCase();
    const statusCell = row.cells[3];
    const status = statusCell.textContent.toLowerCase().trim();
    
    const matchSearch = nombre.includes(search) || cedula.includes(search);
    const matchStatus = !statusFilter || status.includes(statusFilter);
    
    row.style.display = (matchSearch && matchStatus) ? '' : 'none';
  });
}

// ========== ESTADÍSTICAS ==========
function actualizarEstadisticas() {
  const total = datosPersonas.length;
  const locales = Object.keys(localesMap).filter(l => localesMap[l].length > 0).length;
  const presentes = datosPersonas.filter(p => p.estado_asistencia === 'presente').length;
  const pendientes = datosPersonas.filter(p => p.estado_asistencia === 'pendiente').length;
  
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-locales').textContent = locales;
  document.getElementById('stat-presentes').textContent = presentes;
  document.getElementById('stat-pendientes').textContent = pendientes;
}

// ========== MODAL ==========
function abrirModal(idx) {
  editandoIdx = idx;
  const p = datosPersonas[idx];
  
  document.getElementById('modalNombre').value = p.nombre || '';
  document.getElementById('modalCedula').value = p.cedula || '';
  document.getElementById('modalEstado').value = p.estado_asistencia || 'pendiente';
  document.getElementById('modalEmpresa').value = p.empresa || '';
  document.getElementById('modalFirma').value = p.firma || '';
  
  document.getElementById('editModal').classList.add('show');
}

function cerrarModal() {
  document.getElementById('editModal').classList.remove('show');
  editandoIdx = null;
}

async function guardarEdicion() {
  if (editandoIdx === null) return;
  
  const btn = document.getElementById('btnGuardar');
  btn.textContent = 'Guardando...';
  btn.disabled = true;
  
  const p = datosPersonas[editandoIdx];
  const nuevoEstado = document.getElementById('modalEstado').value;
  const nuevoEmpresa = document.getElementById('modalEmpresa').value;
  const nuevoFirma = document.getElementById('modalFirma').value;
  
  try {
    const res = await fetch(SUPA_URL + "/rest/v1/asistencias_virtuales?id=eq." + p.id, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPA_KEY,
        "Authorization": "Bearer " + SUPA_KEY
      },
      body: JSON.stringify({
        estado_asistencia: nuevoEstado,
        empresa: nuevoEmpresa,
        firma: nuevoFirma
      })
    });
    
    if (!res.ok) throw new Error("Error al guardar");
    
    datosPersonas[editandoIdx].estado_asistencia = nuevoEstado;
    datosPersonas[editandoIdx].empresa = nuevoEmpresa;
    datosPersonas[editandoIdx].firma = nuevoFirma;
    
    cerrarModal();
    await cargarDatos();
    renderizarLocales();
    actualizarEstadisticas();
    
  } catch (error) {
    console.error(error);
    alert('Error al guardar cambios');
  }
  
  btn.textContent = 'Guardar';
  btn.disabled = false;
}

// ========== UTILIDADES ==========
function cerrarSesion() {
  if (confirm('¿Cerrar sesión?')) {
    alert('Sesión cerrada');
    // Redirigir a login o recargar
  }
}

// Cerrar modal al hacer click fuera
document.addEventListener('click', (e) => {
  const modal = document.getElementById('editModal');
  if (e.target === modal) cerrarModal();
});
</script>

</body>
</html>
